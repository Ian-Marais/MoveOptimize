<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f6fbd">
    <meta name="description" content="MoveOptimize helps you photograph, group, and find packed boxes when moving house.">
    <title>MoveOptimize</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/assets/app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/vendor/bootstrap-icons/bootstrap-icons.css">
  </head>
  <body>
    <roselt page="home" navigate></roselt>

    <script src="/assets/vendor/roselt/roselt.js"></script>
    <script>
      window.Roselt.start();
      if ("serviceWorker" in navigator) {
        const isLocalDevelopmentHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);

        window.addEventListener("load", async () => {
          if (isLocalDevelopmentHost) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));

            if ("caches" in window) {
              const cacheKeys = await caches.keys();
              await Promise.all(cacheKeys.map((cacheKey) => caches.delete(cacheKey)));
            }

            return;
          }

          const registration = await navigator.serviceWorker.register("/service-worker.js", { updateViaCache: "none" });
          await registration.update();
        });
      }
    </script>
  </body>
</html>
