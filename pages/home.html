<main class="move-app" data-move-app>
  <header class="app-toolbar">
    <div>
      <h1>MoveOptimize</h1>
      <p data-summary>Ready to organize your move.</p>
      <p id="categoryDuplicateWarning" class="category-duplicate-warning" hidden></p>
      <div class="toolbar-search" role="search">
        <input id="itemSearchInput" type="search" placeholder="Search item names">
        <button id="itemSearchButton" type="button">Search</button>
        <button id="orderDirectionButton" class="toolbar-action-button" type="button" aria-label="Order Direction">
          <span>Order Direction</span>
          <i id="orderDirectionIcon" class="bi bi-arrow-up" aria-hidden="true"></i>
        </button>
      </div>
      <p id="searchStatus" class="search-status" hidden></p>
    </div>
    <div class="toolbar-right">
      <button type="button" class="profile-button" aria-label="Profile">
        <i class="bi bi-person-circle" aria-hidden="true"></i>
      </button>
      <div class="toolbar-toggles">
        <label class="category-toggle" for="categoryToggle">
          <span>Categories</span>
          <input id="categoryToggle" type="checkbox" checked>
          <span class="toggle-track" aria-hidden="true"><span></span></span>
        </label>
        <label class="category-toggle" for="autoBoxNumberToggle">
          <span>Auto Box Numbers</span>
          <input id="autoBoxNumberToggle" type="checkbox" checked>
          <span class="toggle-track" aria-hidden="true"><span></span></span>
        </label>
      </div>
    </div>
  </header>

  <section class="workspace" aria-label="Move organizer">
    <div id="organizerList" class="organizer-list"></div>
  </section>

  <aside id="bulkActions" class="bulk-actions" aria-label="Selected box actions" hidden>
    <button type="button" class="danger" data-action="bulk-delete">Delete</button>
    <button type="button" data-action="clear-selection">Cancel</button>
  </aside>

  <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden>
  <input id="galleryInput" type="file" accept="image/*" hidden>
  <input id="contentCameraInput" type="file" accept="image/*" capture="environment" hidden>
  <input id="contentGalleryInput" type="file" accept="image/*" hidden>

  <div id="confirmModal" class="modal-backdrop" hidden>
    <section class="modal-panel confirm-panel" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h2 id="confirmTitle">Are you sure?</h2>
      <p id="confirmMessage">This action will update your organizer.</p>
      <div class="modal-actions">
        <button type="button" data-confirm="no">No</button>
        <button type="button" class="primary" data-confirm="yes">Yes</button>
      </div>
    </section>
  </div>

  <div id="photoModal" class="modal-backdrop" hidden>
    <section class="modal-panel photo-panel" role="dialog" aria-modal="true" aria-labelledby="photoTitle">
      <h2 id="photoTitle">Use this photo?</h2>
      <img id="photoPreview" alt="Box photo preview">
      <div class="modal-actions three-actions">
        <button type="button" data-photo="cancel">Cancel</button>
        <button type="button" data-photo="retry">Retry</button>
        <button type="button" class="primary" data-photo="yes">Yes</button>
      </div>
    </section>
  </div>

  <div id="boxCreateModal" class="modal-backdrop" hidden>
    <section class="modal-panel box-create-panel" role="dialog" aria-modal="true" aria-labelledby="boxCreateTitle">
      <div class="modal-heading">
        <h2 id="boxCreateTitle">New Folder or Box</h2>
        <p>Add a photo, name it, then choose a unique box number.</p>
      </div>
      <div class="box-create-form">
        <div class="box-create-photo-block">
          <img id="boxCreatePreview" src="/assets/box-placeholder.svg" alt="Folder or box photo preview">
          <div class="box-create-photo-actions">
            <button type="button" data-action="draft-camera">Take Photo</button>
            <button type="button" data-action="draft-gallery">Choose Photo</button>
            <button type="button" data-action="draft-clear-photo">Remove Photo</button>
          </div>
        </div>
        <label class="box-create-field" for="boxCreateName">
          <span>Folder or Box name</span>
          <input id="boxCreateName" type="text" maxlength="120" placeholder="Name this folder or box">
        </label>
        <label class="box-create-field" for="boxCreateNumber">
          <span>Box number</span>
          <input id="boxCreateNumber" type="number" inputmode="numeric" min="1" step="1" placeholder="Enter a unique number">
        </label>
        <p id="boxCreateError" class="form-error" hidden></p>
      </div>
      <div class="modal-actions">
        <button type="button" data-action="cancel-box-draft">Cancel</button>
        <button type="button" class="primary" data-action="create-box-draft">Create</button>
      </div>
      <input id="boxCreateCameraInput" type="file" accept="image/*" capture="environment" hidden>
      <input id="boxCreateGalleryInput" type="file" accept="image/*" hidden>
    </section>
  </div>

  <div id="lightboxModal" class="modal-backdrop lightbox-backdrop" hidden>
    <section class="modal-panel lightbox-panel" role="dialog" aria-modal="true" aria-label="Enlarged box image">
      <button type="button" class="icon-button lightbox-close" data-action="close-lightbox" aria-label="Close enlarged image"><i class="bi bi-x-lg"></i></button>
      <img id="lightboxImage" class="lightbox-image" alt="Enlarged box image">
    </section>
  </div>

  <div id="categoryDeleteModal" class="modal-backdrop" hidden>
    <section class="modal-panel category-delete-panel" role="dialog" aria-modal="true" aria-labelledby="categoryDeleteTitle">
      <button type="button" class="icon-button close-modal" data-action="close-category-delete" aria-label="Close category deletion"><i class="bi bi-x-lg"></i></button>
      <div class="modal-heading">
        <h2 id="categoryDeleteTitle">Delete Category</h2>
        <p id="categoryDeleteSubtitle">Move or delete the boxes in this category first.</p>
      </div>
      <div class="category-delete-grid">
        <section>
          <div class="overlay-toolbar">
            <button type="button" data-action="overlay-select-all">Select All</button>
            <button type="button" class="danger" data-action="overlay-delete-selected">Delete</button>
          </div>
          <div id="overlayBoxList" class="overlay-list"></div>
        </section>
        <section>
          <h3>Move to</h3>
          <div id="overlayCategoryList" class="overlay-list category-targets"></div>
        </section>
      </div>
    </section>
  </div>
</main>
